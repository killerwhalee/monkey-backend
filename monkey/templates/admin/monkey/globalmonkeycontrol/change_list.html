{% extends "admin/change_list.html" %}
{% load i18n %}

{% block object-tools %}
  {{ block.super }}
  <div class="module" style="margin: 12px 0; padding: 10px;">
    <h2>{% trans "작업 직접 실행" %}</h2>
    <p style="color: var(--body-quiet-color);">
      {% trans "각 버튼은 해당 Celery 작업을 즉시 큐에 넣습니다." %}
    </p>
    <div>
      {% for name in task_buttons %}
        <form method="post" action="{% url 'admin:monkey_run_task' name %}"
              style="display: inline-block; margin: 3px;">
          {% csrf_token %}
          <button type="submit" class="button">{{ name }}</button>
        </form>
      {% endfor %}
    </div>
  </div>
{% endblock %}
