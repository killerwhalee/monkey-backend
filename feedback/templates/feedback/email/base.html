<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="x-apple-disable-message-reformatting" />
    <title>{% block title %}원숭이 프로젝트{% endblock %}</title>
  </head>
  <body
    style="margin: 0; padding: 0; width: 100%; background-color: #f4f5f7;
           -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;"
  >
    <!-- Preheader: hidden snippet shown in the inbox preview line -->
    <div
      style="display: none; max-height: 0; overflow: hidden; opacity: 0;
             mso-hide: all; font-size: 1px; line-height: 1px; color: #f4f5f7;"
    >
      {% block preheader %}원숭이 프로젝트{% endblock %}
    </div>

    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background-color: #f4f5f7;"
    >
      <tr>
        <td align="center" style="padding: 32px 16px;">
          <table
            role="presentation"
            width="560"
            cellpadding="0"
            cellspacing="0"
            style="width: 560px; max-width: 100%; background-color: #ffffff;
                   border: 1px solid #e6e8eb; border-radius: 14px; overflow: hidden;
                   font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   'Helvetica Neue', Arial, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;"
          >
            <!-- Header -->
            <tr>
              <td
                style="padding: 24px 32px; background-color: #0b1220;
                       border-bottom: 3px solid #10b981;"
              >
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="vertical-align: middle; padding-right: 12px;">
                      <img
                        src="{{ site_url }}/apple-touch-icon.png"
                        width="40"
                        height="40"
                        alt="원숭이 프로젝트"
                        style="display: block; width: 40px; height: 40px;
                               border-radius: 10px; border: 0;"
                      />
                    </td>
                    <td style="vertical-align: middle;">
                      <div
                        style="font-family: 'SFMono-Regular', Menlo, Consolas, monospace;
                               font-size: 16px; font-weight: 700; letter-spacing: 4px;
                               color: #ffffff;"
                      >
                        MONKEY
                      </div>
                      <div
                        style="margin-top: 2px; font-size: 12px; color: #9aa4b2;
                               letter-spacing: 1px;"
                      >
                        원숭이 프로젝트
                      </div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Body -->
            <tr>
              <td
                style="padding: 32px; color: #1f2933; font-size: 15px;
                       line-height: 1.7;"
              >
                {% block content %}{% endblock %}
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td
                style="padding: 20px 32px 28px; background-color: #f8f9fb;
                       border-top: 1px solid #eceef1;"
              >
                <p style="margin: 0 0 6px; font-size: 12px; line-height: 1.6; color: #8a94a3;">
                  본 메일은 발신 전용입니다. 이 주소로 회신하셔도 답변을 받을 수 없습니다.
                  문의는 사이트의 피드백 기능을 이용해 주세요.
                </p>
                <p style="margin: 0; font-size: 12px; line-height: 1.6; color: #8a94a3;">
                  <a href="{{ site_url }}" style="color: #10b981; text-decoration: none;">
                    {{ site_url }}
                  </a>
                  &nbsp;·&nbsp; &copy; 원숭이 프로젝트
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
